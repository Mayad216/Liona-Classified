# Railway service: Settings → Root Directory = frontend

[build]
builder = "RAILPACK"
buildCommand = "npm ci && npm run build:staging"

[deploy]
startCommand = "node scripts/railway-start.mjs"
healthcheckPath = "/railway-health.txt"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
