<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%23f59e0b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Cpath d='M9 21V11h4.5a3.5 3.5 0 0 1 0 7H11v3H9zm2-5h2.5a1.5 1.5 0 0 0 0-3H11v3zm9 5l-2.4-3.6h-.6V21h-2V11h2v4h.6L20 11h2.3l-3 4.7L23 21h-3z' fill='white'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="UAE's all-in-one classifieds platform — shared accommodation, jobs, and home services. Verified users, AI matching, secure payments."
    />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    />
    <title>Khaleej — UAE Classifieds for Homes, Jobs & Services</title>
  </head>
  <body class="bg-white text-slate-900 antialiased">
    <div id="root"></div>
    <!-- Opening this file via file:// cannot load Vite/React — must use the dev server. -->
    <script>
      (function () {
        if (location.protocol !== "file:") return;
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<main style="box-sizing:border-box;max-width:36rem;margin:0 auto;padding:2.5rem 1.5rem;font-family:Inter,system-ui,sans-serif;line-height:1.6;color:#0f172a">' +
          '<p style="margin:0 0 0.75rem;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#4f46e5">Khaleej (dev)</p>' +
          "<h1 style=\"margin:0 0 1rem;font-size:1.5rem;font-weight:800;line-height:1.25\">This page must run through Vite</h1>" +
          "<p style=\"margin:0 0 1rem;color:#475569;font-size:0.95rem\">Double‑clicking <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">index.html</code> opens a <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">file://</code> URL. The app loads TypeScript from <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">/src/main.tsx</code>, which only works when Vite is serving the project.</p>" +
          '<ol style="margin:0 0 1.25rem;padding-left:1.25rem;color:#475569;font-size:0.95rem">' +
          "<li>Open a terminal in the <strong>frontend</strong> folder.</li>" +
          "<li>Run <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">npm install</code> once, then <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">npm run dev</code>.</li>" +
          "<li>Open <strong>http://localhost:5173</strong> in your browser.</li>" +
          "</ol>" +
          "<p style=\"margin:0;color:#64748b;font-size:0.875rem\">After a production build, use <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">npm run preview</code> to view <code style=\"background:#f1f5f9;padding:0.15rem 0.4rem;border-radius:0.35rem;font-size:0.85em\">dist/</code> over HTTP.</p>" +
          "</main>";
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
