# Laravel API — used when Root Directory = backend

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.bcmath",
  "php82Extensions.curl",
  "php82Extensions.fileinfo",
  "php82Extensions.gd",
  "php82Extensions.mbstring",
  "php82Extensions.pdo_mysql",
  "php82Extensions.tokenizer",
  "php82Extensions.xml",
  "php82Extensions.zip",
]

[phases.install]
cmds = [
  "composer update --no-dev --optimize-autoloader --no-interaction --prefer-stable",
]

[start]
cmd = "bash scripts/railway-start.sh"
